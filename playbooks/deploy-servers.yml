---
- name: Verify Ansible version
  hosts: all
  become: true
  tasks:
    - name: Ensure Ansible version is 2.17 or higher
      ansible.builtin.assert:
        that:
          - ansible_version.minor | int >= 17
        fail_msg: "Ansible version must be 2.17 or higher."

- name: Check vars
  hosts: openvpn:mediamtx_server
  become: true
  roles:
    - check_vars

- name: Upgrade, install git and docker
  hosts: alert_server:platform_react_server:openvpn:mediamtx_server:temporal_server
  become: true
  roles:
    - common
    - docker

- name: Sync authorized SSH keys
  hosts: alert_server:platform_react_server
  become: true
  roles:
    - authorized_keys

- name: Deploy Openvpn
  hosts: openvpn
  become: true
  pre_tasks:
    - name: Load iptable_nat now (the openvpn container needs the NAT table)
      community.general.modprobe:
        name: iptable_nat
        state: present
    - name: Ensure iptable_nat is loaded on every boot
      ansible.builtin.copy:
        dest: /etc/modules-load.d/iptable_nat.conf
        content: "iptable_nat\n"
        mode: "0644"
  roles:
    - pyronear.openvpn

- name: Deploy Mediamtx
  hosts: mediamtx_server
  become: true
  roles:
    - mediamtx

- name: Deploy Docker Compose Servers
  hosts: annotation_server
  become: true
  roles:
    - servers

- name: Add VPN client
  hosts: alert_server
  become: true
  serial: 1
  tasks:
    - name: Run client-specific tasks
      ansible.builtin.include_role:
        name: pyronear.openvpn
        tasks_from: install_client.yml

    - name: Remplacer 'redirect-gateway def1' par 'route 192.168.255.0 255.255.255.0'
      ansible.builtin.replace:
        path: /etc/openvpn/client.conf
        regexp: '^redirect-gateway def1$'
        replace: 'route 192.168.255.0 255.255.255.0'

    - name: Unconditionally reboot the machine with all defaults
      ansible.builtin.reboot:

- name: Deploy service platform_react_server
  hosts: platform_react_server
  become: true
  roles:
    # tagged 'app' too: an app-only deploy must never end up without the proxy
    - role: traefik
      tags:
        - app
    - role: platform_react
      tags:
        - app

- name: Deploy service alert_api
  hosts: alert_server
  become: true
  roles:
    # tagged 'app' too: an app-only deploy must never end up without the proxy
    - role: traefik
      tags:
        - app
    - role: alert_api
      tags:
        - app

- name: Deploy service temporal_api
  hosts: temporal_server
  become: true
  roles:
    - role: temporal_api
      tags:
        - app
