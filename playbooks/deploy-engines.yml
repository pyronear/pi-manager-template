---
- name: Check variables
  hosts: engine_servers
  become: true
  pre_tasks:
    - name: Ensure Ansible version is 2.17 or higher
      ansible.builtin.assert:
        that:
          - ansible_version.minor | int >= 17
        fail_msg: "Ansible version must be 2.17 or higher : {{ ansible_version.minor }}"
      run_once: true

  roles:
    - check_vars

- name: Install Alloy monitoring agent
  hosts: engine_servers
  become: true
  tasks:
    - name: Install Alloy
      ansible.builtin.include_role:
        name: grafana.grafana.alloy
      vars:
        config: "{{ alloy_config }}"

- name: Schedule daily reboot cron
  hosts: engine_servers
  become: true
  tasks:
    - name: Create a cronjob to restart the Raspberry Pi every day at midnight
      ansible.builtin.cron:
        name: "Restart Raspberry Pi"
        minute: "0"
        hour: "0"
        job: "/sbin/shutdown -r now"
        user: "root"

- name: Deploy Docker Compose Engines
  hosts: engine_servers
  become: true
  roles:
    - engine
    - engine_cron # needs to be laucnhed after the engine's installation
