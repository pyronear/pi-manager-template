---
- name: Loading environment variables
  tags: always
  ansible.builtin.set_fact:
    admin_login: '{{ lookup("env", "SUPERADMIN_LOGIN") }}'
    admin_pwd: '{{ lookup("env", "SUPERADMIN_PWD") }}'
    admin_org: '{{ lookup("env", "SUPERADMIN_ORG") }}'

- name: Check Engine variables
  ansible.builtin.fail:
    msg: "Variable '{{ item.name }}' is empty or None."
  loop:
    - { name: "api_dns",          value: "{{ api_dns }}" }             # group_var/all
    - { name: "pyro_engine_git_ref",    value: "{{ pyro_engine_git_ref }}" }    # group_var/engine_servers
    - { name: "pyro_engine_docker_tag", value: "{{ pyro_engine_docker_tag }}" } # group_var/engine_servers
    - { name: "CAM_USER",         value: "{{ CAM_USER }}" }            # group_var/all
    - { name: "CAM_PWD",          value: "{{ CAM_PWD }}" }             # group_var/all
    - { name: "config_json",      value: "{{ config_json }}" }         # host_var
    - { name: "ansible_password", value: "{{ ansible_password }}" }    # host_var
    - { name: "admin_login",      value: "{{ admin_login }}" }         # .env
    - { name: "admin_pwd",        value: "{{ admin_pwd }}" }           # .env
    - { name: "S3_ENDPOINT_URL",  value: "{{ S3_ENDPOINT_URL }}" }     # inventory vars
    - { name: "S3_ACCESS_KEY",    value: "{{ S3_ACCESS_KEY }}" }       # inventory vars
    - { name: "S3_SECRET_KEY",    value: "{{ S3_SECRET_KEY }}" }       # inventory vars
    - { name: "S3_REGION",        value: "{{ S3_REGION }}" }           # inventory vars
    - { name: "alloy_config",     value: "{{ alloy_config }}" }        # group_var/engine
  when:
    - inventory_hostname in groups["engine_servers"]
    - item.value is none or item.value | length == 0
  no_log: false

- name: Check API variables. no_log=true
  ansible.builtin.fail:
    msg: "Variable '{{ item.name }}' is empty or None."
  loop:
    - { name: "admin_login",      value: "{{ admin_login }}" }
    - { name: "admin_pwd",        value: "{{ admin_pwd }}" }
    - { name: "admin_org",        value: "{{ admin_org }}" }
    - { name: "S3_ENDPOINT_URL",  value: "{{ S3_ENDPOINT_URL }}" }
    - { name: "S3_ACCESS_KEY",    value: "{{ S3_ACCESS_KEY }}" }
    - { name: "S3_SECRET_KEY",    value: "{{ S3_SECRET_KEY }}" }
    - { name: "S3_REGION",        value: "{{ S3_REGION }}" }
    # - { name: "S3_PROXY_URL",   value: "{{ S3_PROXY_URL }}" }
    - { name: "POSTGRES_USER",    value: "{{ POSTGRES_USER }}" }
    - { name: "POSTGRES_PASSWORD", value: "{{ POSTGRES_PASSWORD }}" }
    - { name: "POSTGRES_DB",      value: "{{ POSTGRES_DB }}" }
    - { name: "prefix",           value: "{{ prefix }}" }
  when:
    - inventory_hostname in groups["alert_server"]
    - item.value is none or item.value | length == 0
  no_log: true

- name: Check Plateform variables. no_log=true
  ansible.builtin.fail:
    msg: "Variable '{{ item.name }}' is empty or None."
  loop:
    - { name: "api_dns",     value: "{{ api_dns }}" }
    - { name: "admin_login", value: "{{ admin_login }}" }  # DOES THE PLATFORM REALLY NEED ADMIN PWD ?
    - { name: "admin_pwd",   value: "{{ admin_pwd }}" }
    - { name: "prefix",      value: "{{ prefix }}" }
  when:
    - inventory_hostname in groups["platform_py_server"]
    - item.value is none or item.value | length == 0
  no_log: true

- name: Check Annotation server variables. no_log=true
  ansible.builtin.fail:
    msg: "Variable '{{ item.name }}' is empty or None."
  loop:
    - { name: "annotation_api_s3_endpoint_url", value: "{{ annotation_api_s3_endpoint_url | default('') }}" }
    - { name: "annotation_api_s3_access_key",   value: "{{ annotation_api_s3_access_key | default('') }}" }
    - { name: "annotation_api_s3_secret_key",   value: "{{ annotation_api_s3_secret_key | default('') }}" }
    - { name: "annotation_api_s3_region",       value: "{{ annotation_api_s3_region | default('') }}" }
    - { name: "annotation_api_s3_bucket_name",  value: "{{ annotation_api_s3_bucket_name | default('') }}" }
    - { name: "platform_server_name",           value: "{{ platform_server_name | default('') }}" }
    - { name: "POSTGRES_USER",                  value: "{{ POSTGRES_USER | default('') }}" }
    - { name: "POSTGRES_PASSWORD",              value: "{{ POSTGRES_PASSWORD | default('') }}" }
    - { name: "POSTGRES_DB",                    value: "{{ POSTGRES_DB | default('') }}" }
  when:
    - inventory_hostname in groups.get("annotation_server", [])
    - item.value is none or item.value | length == 0
  no_log: true

- name: Check watchdog_type is set and valid on engines
  ansible.builtin.assert:
    that:
      - watchdog_type is defined
      - watchdog_type in ["no_watchdog", "pi_zero", "shelly"]
    fail_msg: >-
      'watchdog_type' must be one of: no_watchdog, pi_zero, shelly
      (host: {{ inventory_hostname }}, got: {{ watchdog_type | default("<undefined>") }}).
    success_msg: "watchdog_type = {{ watchdog_type }}"
  when: inventory_hostname in groups["engine_servers"]

- name: Check pi_zero_hostname is set when watchdog_type == pi_zero
  ansible.builtin.fail:
    msg: "'pi_zero_hostname' is required when watchdog_type == 'pi_zero' (host: {{ inventory_hostname }})."
  when:
    - inventory_hostname in groups["engine_servers"]
    - watchdog_type | default("") == "pi_zero"
    - pi_zero_hostname is not defined or pi_zero_hostname | length == 0

- name: Check shelly_ip is set when watchdog_type == shelly
  ansible.builtin.fail:
    msg: "'shelly_ip' is required when watchdog_type == 'shelly' (host: {{ inventory_hostname }})."
  when:
    - inventory_hostname in groups["engine_servers"]
    - watchdog_type | default("") == "shelly"
    - shelly_ip is not defined or shelly_ip | length == 0

- name: Retrieve the list of groups
  ansible.builtin.set_fact:
    group_list:
      - openvpn
      - platform_py_server
      - alert_server

- name: Verify that each group contains only one host
  ansible.builtin.assert:
    that:
      - "groups[item] | length <= 1"
    fail_msg: "The'{{ item }}' group contains more than one server"
    success_msg: "The '{{ item }}' does indeed contain a single server."
  loop: "{{ group_list }}"
