---

- name: Create a network
  community.docker.docker_network:
    name: web

- name: Create working directory if it does not exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  with_items:
    - "{{ alert_api_working_dir }}"
    - "{{ alert_api_working_dir_traefik }}"

- name: Stop all services
  community.docker.docker_compose_v2:
    project_src: "{{ alert_api_working_dir }}"
    state: absent
    remove_images: all
  ignore_errors: true

- name: Create empty acme file for traefik
  ansible.builtin.copy:
    content: ""
    dest: "{{ alert_api_working_dir_traefik }}/acme.json"
    force: false
    mode: 0600 # required by traefik

- name: Check whether traefik.toml was left as a directory by a broken deploy
  ansible.builtin.stat:
    path: "{{ alert_api_working_dir_traefik }}/traefik.toml"
  register: traefik_toml_stat

- name: Remove stale traefik.toml directory so the template can create the file
  ansible.builtin.file:
    path: "{{ alert_api_working_dir_traefik }}/traefik.toml"
    state: absent
  when: traefik_toml_stat.stat.isdir | default(false)

- name: Create static and dynamic conf files for traefik
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ alert_api_working_dir_traefik }}/{{ item }}"
    mode: 0600
  with_items:
    - "traefik.toml"
    - "dynamic_assets.toml"

- name: Copy docker-compose.yml and .env for alert_api
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ alert_api_working_dir }}/{{ item }}"
    mode: 0644
  with_items:
    - "docker-compose.yml"
    - ".env"

- name: Docker Compose start and verify containers are running
  community.docker.docker_compose_v2:
    project_src: "{{ alert_api_working_dir }}"
    wait: true
    wait_timeout: 120
