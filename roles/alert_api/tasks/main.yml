---

- name: Create working directory if it does not exist
  ansible.builtin.file:
    path: "{{ alert_api_working_dir }}"
    state: directory
    mode: '0755'

- name: Stop all services
  community.docker.docker_compose_v2:
    project_src: "{{ alert_api_working_dir }}"
    state: absent
    remove_images: all
  ignore_errors: true

- name: Publish S3 assets routing to the shared traefik dynamic conf directory
  ansible.builtin.template:
    src: dynamic_assets.toml.j2
    dest: "{{ traefik_dynamic_dir }}/alert_api_assets.toml"
    mode: 0600

- name: Copy docker-compose.yml and .env for alert_api
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ alert_api_working_dir }}/{{ item }}"
    mode: 0644
  with_items:
    - "docker-compose.yml"
    - ".env"

- name: Docker Compose start and verify containers are running
  community.docker.docker_compose_v2:
    project_src: "{{ alert_api_working_dir }}"
    wait: true
    wait_timeout: 120
