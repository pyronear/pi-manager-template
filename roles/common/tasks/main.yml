---
# Some cloud images (e.g. OVH Ubuntu) pre-configure the Docker repo signed by
# a different key than geerlingguy.docker's /etc/apt/keyrings/docker.asc; two
# entries for the same repo with different Signed-By break apt entirely.
- name: Check for a pre-existing Docker apt source
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/docker.list
  register: docker_apt_list

- name: Remove Docker apt entries signed by a conflicting key
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/docker.list
    regexp: '^deb(?!.*signed-by=/etc/apt/keyrings/docker\.asc).*download\.docker\.com'
    state: absent
  when: docker_apt_list.stat.exists

# Common tasks for all servers
- name: Update and upgrade apt packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    autoremove: true

# Common tasks for all servers
- name: Install git
  ansible.builtin.apt:
    name: git
    state: present
