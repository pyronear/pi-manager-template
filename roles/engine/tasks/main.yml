---

# Tasks to setup Engine
- name: Git checkout
  ansible.builtin.git:
    repo: 'https://github.com/pyronear/{{ project_name }}.git'
    dest: /home/{{ project_name }}
    version: '{{ pyro_engine_git_ref }}'
    accept_hostkey: true


- name: Pull pyro-engine image from Docker Hub
  community.docker.docker_image:
    name: "pyronear/pyro-engine:{{ pyro_engine_docker_tag }}"
    source: pull
    force_source: true

- name: Pull pyro-camera-api image from Docker Hub
  community.docker.docker_image:
    name: "pyronear/pyro-camera-api:{{ pyro_engine_docker_tag }}"
    source: pull
    force_source: true

- name: Create a directory if it does not exist
  ansible.builtin.file:
    path: /home/{{ app_name }}/data
    state: directory
    mode: '0755'
    recurse: true
  changed_when: false

- name: Get API token
  ansible.builtin.uri:
    url: "https://{{ api_dns }}/api/v1/login/creds"
    method: POST
    body_format: form-urlencoded
    body:
      username: "{{ admin_login }}"
      password: "{{ admin_pwd }}"
    return_content: yes
    timeout: 5
    status_code: 200
  register: response

- name: Parse JSON response to get the access token
  ansible.builtin.set_fact:
    admin_token: "{{ response.json.access_token }}"

- name: Parse config_json as JSON
  ansible.builtin.set_fact.set_fact:
    json_file_content: "{{ config_json }}"

# - name: Validate credentials.json against JSON Schema
#  ansible.utils.validate:
#    data: "{{ json_file_content }}"
#    criteria: "{{ engine_json_schema }}"
#    engine: ansible.utils.jsonschema
#  failed_when: false
#  changed_when: False

- name: Loop through cameras and get tokens
  vars:
    updated_json: "{{ json_file_content }}"
  block:
    - name: Get API token for each camera
      ansible.builtin.uri:
        url: "https://{{ api_dns }}/api/v1/cameras/{{ item.value.id }}/token"
        method: POST
        headers:
          Authorization: "Bearer {{ admin_token }}"
          accept: "application/json"
        return_content: yes
        timeout: 5
        status_code: 200
      register: response
      with_dict: "{{ json_file_content }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Update tokens in the JSON structure
      ansible.builtin.set_fact:
        updated_json: >-
          {{
            updated_json | combine({
              item.item.key: item.item.value | combine({
                'token': item.json.access_token
              })
            })
          }}
      loop: "{{ response.results }}"
      loop_control:
        label: "{{ item.item.key }}"

- name: Write updated credentials.json
  ansible.builtin.copy:
    content: "{{ updated_json | to_nice_json }}"
    dest: /home/{{ app_name }}/data/credentials.json
    mode: '0600'

- name: Copy .env file
  ansible.builtin.template:
    src: ".env.{{ app_name }}.j2"
    dest: /home/{{ app_name }}/.env
    mode: '0644'

- name: Copy docker-compose file from upstream repo
  ansible.builtin.copy:
    src: /home/{{ project_name }}/docker-compose.yml
    dest: /home/{{ app_name }}/docker-compose.yml
    remote_src: true
    mode: '0644'

- name: Remove old engine container manually
  community.docker.docker_container:
    name: engine
    state: absent

- name: Remove old reolink-api container manually
  community.docker.docker_container:
    name: reolink-api
    state: absent

- name: Remove old pyro-camera-api container manually
  community.docker.docker_container:
    name: pyro-camera-api
    state: absent

- name: Ensure Docker Compose containers are running
  community.docker.docker_compose_v2:
    project_src: /home/{{ app_name }}/
    wait: true
